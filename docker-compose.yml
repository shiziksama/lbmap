version: "3.9"

services:
    postgres:
        image: postgis/postgis:16-3.4
        container_name: lbmap-postgres
        restart: unless-stopped
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: lbmap
            POSTGRES_USER: lbmap
            POSTGRES_PASSWORD: lbmap
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./tileproduction/sql/initdb:/docker-entrypoint-initdb.d:ro
            - ./tileproduction/sql:/sql:ro

    postgrest:
        image: postgrest/postgrest:v12.2.3
        container_name: lbmap-postgrest
        restart: unless-stopped
        environment:
            PGRST_DB_URI: postgres://lbmap:lbmap@postgres:5432/lbmap
            PGRST_DB_SCHEMA: public
            PGRST_DB_ANON_ROLE: lbmap
        depends_on:
            - postgres

    martin:
        image: maplibre/martin
        container_name: lbmap-martin
        restart: unless-stopped
        ports:
            - "3000:3000"
        environment:
            DATABASE_URL: postgres://lbmap:lbmap@postgres:5432/lbmap
        depends_on:
            - postgres

    legacy:
        image: nginx:alpine
        container_name: lbmap-legacy
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./public/legacy:/usr/share/nginx/html:ro
            - ./docker/nginx/legacy.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - postgrest

    osm2pgsql:
        image: iboates/osm2pgsql:latest
        container_name: lbmap-osm2pgsql
        profiles:
            - import
        depends_on:
            - postgres
        environment:
            PGPASSWORD: lbmap
        volumes:
            - ./tileproduction/osm2pgsql:/config:ro
            - ${DATA_DIR:-./data}:/data:ro
        command:
            [
                "osm2pgsql",
                "-O",
                "flex",
                "-S",
                "/config/flex.lua",
                "--create",
                "--slim",
                "--cache",
                "2000",
                "--number-processes",
                "1",
                "-d",
                "lbmap",
                "-U",
                "lbmap",
                "-H",
                "postgres",
                "-P",
                "5432",
                "${PBF_OUT:-/data/planet-filtered.osm.pbf}",
            ]

    pbf-highways:
        build:
            context: .
            dockerfile: ./docker/osm-tools/Dockerfile
        container_name: lbmap-pbf-highways
        profiles:
            - prepare
        volumes:
            - ${DATA_DIR:-./data}:/data
            - ./o5m:/o5m:ro
        command:
            [
                "osmium",
                "tags-filter",
                "--progress",
                "-v",
                "-t",
                "${PBF_IN:-/data/planet-latest.osm.pbf}",
                "w/highway",
                "-o",
                "${PBF_HIGHWAYS:-/data/planet-highways.osm.pbf}",
            ]

    pbf-filter-cpp:
        build:
            context: .
            dockerfile: ./docker/osm-tools/Dockerfile
        container_name: lbmap-pbf-filter-cpp
        profiles:
            - prepare
        volumes:
            - ${DATA_DIR:-./data}:/data
            - ./o5m:/o5m:ro
        command:
            [
                "/usr/local/bin/filter_osmium_cpp",
                "--in",
                "${PBF_HIGHWAYS:-/data/planet-highways.osm.pbf}",
                "--out",
                "${PBF_CPP_OUT:-/data/planet-filtered-cpp.osm.pbf}",
            ]

    pbf-filter-py:
        build:
            context: .
            dockerfile: ./docker/osm-tools/Dockerfile
        container_name: lbmap-pbf-filter-py
        profiles:
            - prepare
        volumes:
            - ${DATA_DIR:-./data}:/data
            - ./o5m:/o5m:ro
        command:
            [
                "python3",
                "/o5m/filter_osmium.py",
                "--in",
                "${PBF_CPP_OUT:-/data/planet-filtered-cpp.osm.pbf}",
                "--out",
                "${PBF_OUT:-/data/planet-filtered.osm.pbf}",
            ]

volumes:
    postgres_data:
