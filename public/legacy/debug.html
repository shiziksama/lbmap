<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <title>Debug Lines</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <style>
      html,
      body,
      #map {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      const map = L.map('map').setView([50.45, 30.52], 12);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 20,
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      let roadsLayer;
      let pending = false;

      function loadLines() {
        if (pending) return;
        pending = true;

        const bounds = map.getBounds();
        const payload = {
          minx: bounds.getWest(),
          miny: bounds.getSouth(),
          maxx: bounds.getEast(),
          maxy: bounds.getNorth()
        };

        fetch('/api/lines', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        })
          .then(res => res.json())
          .then(rows => {
            const features = rows.map(row => {
            const tags = row.tags || {};
            const name = tags.name || tags['name:uk'] || 'Без назви';

            return {
              type: 'Feature',
              geometry: row.geometry,
              properties: {
                name,
                tags,
                osm_id: row.osm_id
              }
            };
          });

            if (roadsLayer) {
              map.removeLayer(roadsLayer);
            }

            roadsLayer = L.geoJSON({ type: 'FeatureCollection', features }, {
              onEachFeature: function (feature, layer) {
                layer.on('click', function () {
                const tags = feature.properties.tags || {};
                const tagsHtml = Object.keys(tags).length
                  ? `<pre>${JSON.stringify(tags, null, 2)}</pre>`
                  : '<i>No tags</i>';

                layer.bindPopup(
                  `<b>${feature.properties.name}</b><br/>${tagsHtml}`
                ).openPopup();
              });
            }
          }).addTo(map);
        })
          .finally(() => {
            pending = false;
          });
      }

      map.on('moveend', loadLines);
      loadLines();
    </script>
  </body>
</html>
